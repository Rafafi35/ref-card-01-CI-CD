name: Docker CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Maven Cache
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Tests ausführen
        run: mvn test

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Debug tags
        run: echo "${{ toLower(secrets.DOCKERHUB_USERNAME) }}/m347-ref-card-01 and ghcr.io/${{ toLower(github.repository) }}"


      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ toLower(github.actor) }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Image bauen
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/m347-ref-card-01:latest \
            -t ghcr.io/${{ toLower(github.repository) }}:latest \
            .

      - name: Docker Image pushen
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/m347-ref-card-01:latest

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ toLower(github.repository) }}:latest
