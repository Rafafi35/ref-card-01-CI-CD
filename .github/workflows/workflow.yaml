name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build ausführen
        run: mvn -B clean package -DskipTests

      - name: Tests ausführen
        run: mvn -B test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: QEMU einrichten
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ../dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rafafi35/ci-cd-uebung:latest
            ghcr.io/rafafi35/ci-cd-uebung:${{ github.sha }}

